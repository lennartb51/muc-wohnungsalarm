# ---------------------------------------------------------------
# Filter-Konfiguration
# Anpassen und committen — Änderungen greifen ab dem nächsten Run.
# ---------------------------------------------------------------
#
# MULTI-PROFILE (optional): Wenn du Freunde mit eigenen Suchparametern
# bedienen willst, dekommentiere unten den `profiles:` Block. Jedes
# Profil bekommt eigenen Telegram-Chat + eigenen seen-State.
#
# Beispiel:
# profiles:
#   - name: lennart
#     chat_id: ${TELEGRAM_CHAT_ID}     # env var (existiert schon)
#     # alle Filter werden vom top-level übernommen
#   - name: max
#     chat_id: ${TELEGRAM_CHAT_ID_MAX} # env var setzen in GitHub Secrets
#     max_price: 2500                  # Profil-spezifisch, überschreibt top-level
#     min_sqm: 60
#     districts_whitelist: [Bogenhausen, Schwabing, Lehel]
#
# Wenn `profiles` fehlt: Single-Profile-Modus mit TELEGRAM_CHAT_ID (wie bisher).

# Preis (warm bevorzugt, fällt auf kalt zurück wenn nicht verfügbar)
max_price: 1800   # €
min_price: 400    # Schutz vor Scam-Anzeigen

# Größe in m²
min_sqm: 35
# max_sqm: 120    # Optional

# Zimmer
min_rooms: 1
# max_rooms: 4

# --- PLZ-Whitelist (München) -------------------------------------
# Formate je Eintrag:
#   - Einzelne PLZ als Zahl:    80469
#   - Range als String:         "80331-80339"
#   - Range als Liste:          [80636, 80809]
#
# Wenn die Whitelist leer ist, kommen alle PLZ durch.
# postcode_strict: true → Listings ohne erkannte PLZ werden verworfen
# postcode_strict: false (Default) → Listings ohne PLZ kommen durch
postcode_whitelist:
  - "80331-80339"   # Altstadt, Maxvorstadt, Ludwigsvorstadt, Isarvorstadt
  - 80469           # Isarvorstadt / Glockenbach / Gärtnerplatz
  - "80538-80539"   # Lehel
  - "80636-80639"   # Neuhausen
  - "80796-80809"   # Schwabing-West, Schwabing
  - 81543           # Au
  - "81667-81679"   # Haidhausen, Bogenhausen (Süd)
  - "81925-81929"   # Bogenhausen (Nord), Oberföhring
  - "81735-81739"   # Ramersdorf, Perlach (falls relevant)

postcode_strict: false

# Stadtteile (zusätzlicher String-Filter, leer = alle erlauben).
# Bei vorhandener PLZ-Whitelist redundant, aber als Backup für Listings ohne PLZ.
#
# Explizite Varianten statt Regex-Magie. Bewusst breit gefasst:
# false positives (eine Wohnung in Pasing mit "5min zur Maxvorstadt") sind
# weniger schlimm als false negatives (Glockenbachviertel verpasst).
# Falsch-durchgelassene Wohnungen scrollst du in Telegram weg —
# nicht-gemeldete Wohnungen sind verloren.
districts_whitelist:
