# Ausstattung (Pflicht-Flags)
# require_balcony: true     # Listing muss "Balkon" erwähnen
# require_kitchen: true     # Listing muss "Küche/EBK" erwähnen

# Negativ-Keywords im Titel/Beschreibung
# Word-Boundary-Match (\bWort\b), also keine Sorge dass z.B. "Au" in
# "Hausverwaltung" matched. ABER bewusst KEIN "Kauf" hier — auch mit
# Word-Boundary zu breit ("zum Kauf angeboten", "Kaufoption nach 5 Jahren",
# "Vorkaufsrecht"). Kapitalanlage reicht für reine Anlage-Listings.
exclude_keywords:
  - WG-Zimmer
  - WG-Wohnung
  - Mitbewohner
  - Mitbewohnerin
  - shared apartment
  - shared room
  - shared flat
  - room in
  - flat share
  - flatshare
  - Zwischenmiete
  - Zwischenmieten
  - Tausch
  - Tauschwohnung
  - Kapitalanlage
  - Untermiete
  - befristet
  - Studentenwohnheim
  - Seniorenwohnen
  - Seniorenwohnheim
  - Seniorenresidenz
  - Pensionswohnheim
  # Status-Wörter: Wohnung bereits weg
  - vermietet
  - vermietete
  - vermietetes
  - vermieteter
  - vergeben
  - reserviert
  - verkauft

# Adapter, die deaktiviert werden sollen
disabled_adapters: []
  # - Kleinanzeigen
