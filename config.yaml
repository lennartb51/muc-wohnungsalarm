# ---------------------------------------------------------------
# Filter-Konfiguration
# Anpassen und committen — Änderungen greifen ab dem nächsten Run.
# ---------------------------------------------------------------

# Preis (warm bevorzugt, fällt auf kalt zurück wenn nicht verfügbar)
max_price: 1800   # €
min_price: 400    # Schutz vor Scam-Anzeigen

# Größe in m²
min_sqm: 35
# max_sqm: 120    # Optional

# Zimmer
min_rooms: 2
# max_rooms: 4

# --- PLZ-Whitelist (München) -------------------------------------
# Formate je Eintrag:
#   - Einzelne PLZ als Zahl:    80469
#   - Range als String:         "80331-80339"
#   - Range als Liste:          [80636, 80809]
#
# Wenn die Whitelist leer ist, kommen alle PLZ durch.
# postcode_strict: true → Listings ohne erkannte PLZ werden verworfen
# postcode_strict: false (Default) → Listings ohne PLZ kommen durch
postcode_whitelist:
  - "80331-80339"   # Altstadt, Maxvorstadt, Ludwigsvorstadt, Isarvorstadt
  - 80469           # Isarvorstadt / Glockenbach / Gärtnerplatz
  - "80538-80539"   # Lehel
  - "80636-80639"   # Neuhausen
  - "80796-80809"   # Schwabing-West, Schwabing
  - 81543           # Au
  - "81667-81679"   # Haidhausen, Bogenhausen (Süd)
  - "81925-81929"   # Bogenhausen (Nord), Oberföhring
  - "81735-81739"   # Ramersdorf, Perlach (falls relevant)

postcode_strict: false

# Stadtteile (zusätzlicher String-Filter, leer = alle erlauben).
# Bei vorhandener PLZ-Whitelist redundant, aber als Backup für Listings ohne PLZ.
districts_whitelist:
  - Altstadt
  - Lehel
  - Glockenbach
  - Isarvorstadt
  - Gärtnerplatz
  - Au
  - Haidhausen
  - Maxvorstadt
  - Schwabing
  - Ludwigsvorstadt
  - Sendling
  - Westend
  - Neuhausen
  - Bogenhausen

# Ausstattung (Pflicht-Flags)
# require_balcony: true     # Listing muss "Balkon" erwähnen
# require_kitchen: true     # Listing muss "Küche/EBK" erwähnen

# Negativ-Keywords im Titel/Beschreibung
# Word-Boundary-Match (\bWort\b), also keine Sorge dass z.B. "Au" in
# "Hausverwaltung" matched. ABER bewusst KEIN "Kauf" hier — auch mit
# Word-Boundary zu breit ("zum Kauf angeboten", "Kaufoption nach 5 Jahren",
# "Vorkaufsrecht"). Kapitalanlage reicht für reine Anlage-Listings.
exclude_keywords:
  - WG-Zimmer
  - Zwischenmiete
  - Zwischenmieten
  - möbliert
  - Tausch
  - Tauschwohnung
  - Kapitalanlage
  - Untermiete
  - befristet
  - Studentenwohnheim
  - Seniorenwohnen
  - Seniorenwohnheim
  - Seniorenresidenz
  - Pensionswohnheim
  # Status-Wörter: Wohnung bereits weg
  - vermietet
  - vermietete
  - vermietetes
  - vermieteter
  - vergeben
  - reserviert
  - verkauft

# Adapter, die deaktiviert werden sollen
disabled_adapters: []
  # - Kleinanzeigen
