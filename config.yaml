# Ausstattung (Pflicht-Flags)
# require_balcony: true     # Listing muss "Balkon" erwähnen
# require_kitchen: true     # Listing muss "Küche/EBK" erwähnen

# Negativ-Keywords im Titel/Beschreibung
# Word-Boundary-Match (\bWort\b), also keine Sorge dass z.B. "Au" in
# "Hausverwaltung" matched. ABER bewusst KEIN "Kauf" hier — auch mit
# Word-Boundary zu breit ("zum Kauf angeboten", "Kaufoption nach 5 Jahren",
# "Vorkaufsrecht"). Kapitalanlage reicht für reine Anlage-Listings.
exclude_keywords:
  - WG-Zimmer
  - WG-Wohnung
  - Mitbewohner
  - Mitbewohnerin
  - shared apartment
  - shared room
  - shared flat
  - room in
  - flat share
  - flatshare
  - Zwischenmiete
  - Zwischenmieten
  - möbliert
  - Tausch
  - Tauschwohnung
  - Kapitalanlage
  - Untermiete
  - befristet
  - Studentenwohnheim
  - Seniorenwohnen
  - Seniorenwohnheim
  - Seniorenresidenz
  - Pensionswohnheim
  # Status-Wörter: Wohnung bereits weg
  - vermietet
  - vermietete
  - vermietetes
  - vermieteter
  - vermieteten           # Akkusativ/Plural: "die vermieteten Wohnungen"
  - vergeben
  - vergebene
  - vergebener
  - reserviert
  - reservierte
  - reservierter
  - verkauft
  - verkaufte
  - verkaufter
  - bereits-vermietet     # ohne Leerzeichen, kommt manchmal so vor
  - "Wohnung weg"
  - "leider weg"
  - "schon weg"
  - "nicht mehr verfügbar"
  - "nicht mehr aktuell"

  # Verkauf statt Miete (Park Avenue & ähnliche Misch-Anbieter)
  - Grundstück
  - Grundstücke
  - Kaufpreis
  - Kaufobjekt
  - Kaufobjekte
  - Eigentumswohnung
  - Verkaufspreis
  - "zu verkaufen"
  - "zum Kauf"

  # Häuser (außerhalb deines Mietsuche-Fokus, max_price 1800 → unrealistisch)
  - Einfamilienhaus
  - Doppelhaushälfte
  - Reihenhaus
  - Bungalow
  - Villa

# Adapter, die deaktiviert werden sollen
disabled_adapters: []
  # - Kleinanzeigen
