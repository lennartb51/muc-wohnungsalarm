name: Wohnungsalarm

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_IMAP_USER: ${{ secrets.EMAIL_IMAP_USER }}
          EMAIL_IMAP_PASSWORD: ${{ secrets.EMAIL_IMAP_PASSWORD }}
          EMAIL_IMAP_HOST: ${{ secrets.EMAIL_IMAP_HOST }}
        run: python -m src.main

      - name: Commit state back
        run: |
          git config user.name "wohnungsalarm-bot"
          git config user.email "actions@github.com"
          git add data/seen.json
          if git diff --staged --quiet; then
            echo "Kein State-Change, kein Commit"
            exit 0
          fi
          git commit -m "chore: update state [skip ci]"

          # Smart-Retry: bei Push-Konflikt nehmen wir remote als Basis und
          # mergen unsere lokalen UIDs hinzu (statt zu rebasen — vermeidet
          # JSON-Konflikte zwischen parallel laufenden Runs).
          for i in 1 2 3; do
            if git push; then
              echo "Push erfolgreich (Versuch $i)"
              exit 0
            fi
            echo "Push fehlgeschlagen, smart-merge..."

            # Lokale seen.json wegsichern
            cp data/seen.json /tmp/local-seen.json

            # Auf remote zurücksetzen
            git fetch origin main
            git reset --hard origin/main

            # Smart-Merge: UIDs aus beiden zusammenführen
            python3 - << 'EOF'
          import json
          with open('/tmp/local-seen.json') as f:
              local = json.load(f)
          with open('data/seen.json') as f:
              remote = json.load(f)
          # Union; bei doppelten UIDs gewinnt der frühere Timestamp
          merged = dict(remote)
          for uid, ts in local.items():
              if uid not in merged or ts < merged[uid]:
                  merged[uid] = ts
          with open('data/seen.json', 'w') as f:
              json.dump(merged, f, indent=2, sort_keys=True)
          print(f"Merged: remote={len(remote)} + local={len(local)} = {len(merged)} UIDs")
          EOF

            git add data/seen.json
            if git diff --staged --quiet; then
              echo "Nach Merge keine Änderung mehr, fertig"
              exit 0
            fi
            git commit -m "chore: update state [skip ci] (merged)"
            sleep 2
          done
          echo "Push nach 3 Versuchen aufgegeben"
          exit 1
